<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Souvik Chatterjee | Senior QE / SDET</title>
    <script>(function(){try{var t=localStorage.getItem('theme');if(!t)t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
    <!-- Performance hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="image" href="./assets/profile-pic.png" fetchpriority="high">
    <link rel="preload" as="image" href="./assets/about-pic.jpeg">
    <link rel="preload" as="image" href="./assets/linkedin.png">
    <link rel="preload" as="image" href="./assets/github.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="mediaqueries.css" />
  </head>
  <body>
    <nav id="desktop-nav">
      <div class="logo"></div>
      <ul class="nav-links"></ul>
      <button class="theme-toggle" aria-label="Toggle theme" onclick="toggleTheme()">
        <span class="theme-icon">🌙</span>
      </button>
    </nav>

    <nav id="hamburger-nav">
      <div class="logo"></div>
      <div class="hamburger-menu">
        <button class="theme-toggle" aria-label="Toggle theme" onclick="toggleTheme()">
          <span class="theme-icon">🌙</span>
        </button>
        <div class="hamburger-icon" onclick="toggleMenu()">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="menu-links"></div>
      </div>
    </nav>

    <!-- Profile / Hero Section -->
    <section id="profile">
      <div class="section__pic-container">
        <img src="./assets/profile-pic.png" alt="Souvik Chatterjee profile pic" loading="eager" decoding="async" fetchpriority="high" />
      </div>
      <div class="section__text">
        <p class="section__text__p1"></p>
        <h1 class="title"></h1>
        <p class="section__text__p2"></p>
        <p class="section__text__p3"></p>
        <div class="hero-stats"></div>
        <div class="btn-container"></div>
        <div id="socials-container"></div>
      </div>
    </section>

    <!-- About Section -->
    <section id="about">
      <p class="section__text__p1"></p>
      <h1 class="title"></h1>
      <div class="section-container">
        <div class="section__pic-container">
          <img src="./assets/about-pic.jpeg" alt="Profile picture" class="about-pic" loading="eager" decoding="async" />
        </div>
        <div class="about-details-container" data-about></div>
      </div>
    </section>

    <!-- Work Experience Section -->
    <section id="experience">
      <p class="section__text__p1"></p>
      <h1 class="title"></h1>
      <div class="timeline" data-experience></div>
    </section>

    <!-- Skills Section -->
    <section id="skills">
      <p class="section__text__p1"></p>
      <h1 class="title"></h1>
      <div class="skills-grid" data-skills></div>
    </section>

    <!-- Certifications Section -->
    <section id="certifications">
      <p class="section__text__p1"></p>
      <h1 class="title"></h1>
      <div class="cert-grid" data-certifications></div>
    </section>

    <!-- Posts Section -->
    <section id="posts">
      <p class="section__text__p1"></p>
      <h1 class="title"></h1>
      <div class="carousel" data-carousel="posts">
        <div class="carousel-wrapper">
          <button class="carousel-btn carousel-prev" aria-label="Previous post">&#8592;</button>
          <div class="carousel-viewport">
            <div class="carousel-track" data-track></div>
          </div>
          <button class="carousel-btn carousel-next" aria-label="Next post">&#8594;</button>
        </div>
        <div class="carousel-dots" data-dots></div>
      </div>
    </section>

    <!-- Testimonials Section -->
    <section id="testimonials">
      <p class="section__text__p1"></p>
      <h1 class="title"></h1>
      <div class="carousel" data-carousel="recs">
        <div class="carousel-wrapper">
          <button class="carousel-btn carousel-prev" aria-label="Previous recommendation">&#8592;</button>
          <div class="carousel-viewport">
            <div class="carousel-track" data-track></div>
          </div>
          <button class="carousel-btn carousel-next" aria-label="Next recommendation">&#8594;</button>
        </div>
        <div class="carousel-dots" data-dots></div>
      </div>
    </section>


    <!-- Contact Section -->
    <section id="contact">
      <p class="section__text__p1"></p>
      <h1 class="title"></h1>
      <div class="contact-info-upper-container" data-contact></div>
    </section>

    <footer>
      <nav>
        <div class="nav-links-container">
          <ul class="nav-links"></ul>
        </div>
      </nav>
      <p class="footer-copyright"></p>
    </footer>
    <script src="data/site.js"></script>
    <script src="data/profile.js"></script>
    <script src="data/about.js"></script>
    <script src="data/experience.js"></script>
    <script src="data/skills.js"></script>
    <script src="data/certifications.js"></script>
    <script src="data/posts.js"></script>
    <script src="data/recommendations.js"></script>
    <script src="data/socials.js"></script>
    <script src="data/contact.js"></script>
    <script src="script.js"></script>
  </body>
</html>
